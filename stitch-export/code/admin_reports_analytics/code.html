                        "secondary-fixed": "#ffddb5",

                        "on-secondary": "#ffffff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-24 pt-16">
<!-- TopAppBar -->
<header class="bg-surface shadow-sm flex justify-between items-center px-md py-sm w-full fixed top-0 z-50 transition-colors duration-200">
<button class="w-12 h-12 flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile font-bold text-primary tracking-tight">RMAIS M'lang</h1>
<button class="w-12 h-12 flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</header>
<main class="p-container-padding flex flex-col gap-lg max-w-lg mx-auto">
<!-- Page Header -->
<div class="flex justify-between items-end mt-4">
<div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Analytics</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Weekly Price Trends</p>
</div>
<button class="flex items-center gap-xs px-4 py-2 bg-primary-container text-on-primary-container rounded-full font-label-lg text-label-lg hover:bg-primary hover:text-on-primary transition-colors shadow-sm">
<span class="material-symbols-outlined text-sm" data-icon="download">download</span>
                Export
            </button>
</div>
<!-- Chart Card -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-[0_2px_8px_rgba(0,0,0,0.05)] border border-surface-variant">
<div class="flex justify-between items-center mb-4">
<h3 class="font-title-lg text-title-lg text-on-surface">Palay Price</h3>
<div class="px-2 py-1 bg-surface-container rounded-md flex items-center gap-1">
<span class="material-symbols-outlined text-sm text-primary" data-icon="trending_up">trending_up</span>
<span class="font-label-md text-label-md text-primary">+2.4%</span>
</div>
</div>
<div class="w-full h-64 relative">
<canvas id="priceChart"></canvas>
</div>
</section>
<!-- Bento Grid Stats -->
<section class="grid grid-cols-2 gap-card-gap">
<!-- Highest -->
<div class="bg-surface-container-lowest rounded-xl p-md shadow-[0_2px_8px_rgba(0,0,0,0.05)] border border-surface-variant flex flex-col gap-sm">
<span class="material-symbols-outlined text-tertiary-container" data-icon="vertical_align_top">vertical_align_top</span>
<p class="font-label-md text-label-md text-on-surface-variant">Highest Price</p>
<p class="font-headline-md text-headline-md text-on-surface">₱22.50</p>
</div>
<!-- Lowest -->
<div class="bg-surface-container-lowest rounded-xl p-md shadow-[0_2px_8px_rgba(0,0,0,0.05)] border border-surface-variant flex flex-col gap-sm">
<span class="material-symbols-outlined text-error" data-icon="vertical_align_bottom">vertical_align_bottom</span>
<p class="font-label-md text-label-md text-on-surface-variant">Lowest Price</p>
<p class="font-headline-md text-headline-md text-on-surface">₱21.10</p>
</div>
<!-- Average -->
<div class="col-span-2 bg-primary text-on-primary rounded-xl p-md shadow-md flex justify-between items-center">
<div class="flex flex-col gap-xs">
<p class="font-label-md text-label-md opacity-90">Average Price</p>
<p class="font-display-lg text-display-lg">₱21.85</p>
</div>
<div class="w-12 h-12 rounded-full bg-on-primary-fixed-variant flex items-center justify-center opacity-80">
<span class="material-symbols-outlined text-white" data-icon="functions">functions</span>
</div>
</div>
</section>
<!-- Data Quality Box -->
<section class="bg-secondary-fixed rounded-xl p-md border-l-4 border-secondary-container shadow-sm flex gap-md">
<div class="mt-1">
<span class="material-symbols-outlined text-on-secondary-fixed-variant" data-icon="verified_user">verified_user</span>
</div>
<div>
<h4 class="font-title-lg text-title-lg text-on-secondary-fixed-variant">High Confidence</h4>
<p class="font-body-md text-body-md text-on-secondary-fixed mt-1">Data compiled from <strong>142 sources</strong> with <strong>0 anomalies</strong> detected this week.</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface border-t border-outline-variant shadow-[0_-2px_8px_rgba(0,0,0,0.05)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-container-padding py-2 pb-safe rounded-t-xl transition-colors md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low transition-colors rounded-lg">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-md text-label-md mt-1">Home</span>
</button>
<!-- Active Tab: Prices/Analytics -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 transition-transform duration-150 ease-in-out active:scale-90">
<span class="material-symbols-outlined" data-icon="trending_up" data-weight="fill" style="font-variation-settings: 'FILL' 1;">trending_up</span>
<span class="font-label-md text-label-md mt-1">Prices</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low transition-colors rounded-lg">
<span class="material-symbols-outlined" data-icon="smart_toy">smart_toy</span>
<span class="font-label-md text-label-md mt-1">Advisor</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low transition-colors rounded-lg">
<span class="material-symbols-outlined" data-icon="grass">grass</span>
<span class="font-label-md text-label-md mt-1">Plant</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-low transition-colors rounded-lg">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md mt-1">Account</span>
</button>
</nav>
<script>
        // Chart.js implementation for the line chart
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            // Getting Tailwind colors from CSS variables or explicitly defining them for Chart JS
            const primaryColor = '#1b5e20'; // bg-primary-container
            const surfaceColor = '#fcf9f8';
            const gridColor = '#e5e2e1'; // surface-variant

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Price (₱)',
                        data: [21.10, 21.30, 21.25, 21.60, 22.00, 22.30, 22.50],
                        borderColor: primaryColor,
                        backgroundColor: 'rgba(27, 94, 32, 0.1)', // primary with opacity
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: primaryColor,
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: '#303030', // inverse-surface
                            titleFont: { family: 'Inter', size: 12 },
                            bodyFont: { family: 'Inter', size: 14, weight: 'bold' },
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return '₱' + context.parsed.y.toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: gridColor,
                                drawBorder: false,
                            },
                            ticks: {
                                font: { family: 'Inter', size: 12 },
                                color: '#717a6d', // outline
                                callback: function(value) {
                                    return '₱' + value;
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false,
                            },
                            ticks: {
                                font: { family: 'Inter', size: 12 },
                                color: '#717a6d',
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                }
            });
        });
    </script>
</body></html>
